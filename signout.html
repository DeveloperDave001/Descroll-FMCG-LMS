<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Out — Descroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-x-hidden">
    <div class="min-h-screen flex items-center justify-center px-6">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl p-8 shadow-sm text-center">
                <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="log-out" class="w-8 h-8 text-emerald-500"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 mb-3">Successfully Signed Out</h1>
                <p class="text-slate-600 mb-8">You have been securely signed out of your Descroll account. Thank you for using our platform.</p>
                <div class="space-y-3">
                    <a href="login.html" class="block w-full bg-slate-900 text-white py-3 rounded-xl font-medium hover:bg-slate-800 transition-colors">
                        Sign Back In
                    </a>
                    <a href="index.html" class="block w-full py-3 rounded-xl font-medium border border-slate-200 text-slate-600 hover:bg-slate-50 transition-colors">
                        Return to Home
                    </a>
                </div>
                <div class="mt-8 pt-6 border-t border-slate-100">
                    <p class="text-xs text-slate-400">Need help? <a href="contact.html" class="text-blue-600 hover:text-blue-700">Contact Support</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        
        // Clear any stored user data on signout
        if (typeof(Storage) !== "undefined") {
            localStorage.clear();
            sessionStorage.clear();
        }
    </script>
</body>
</html>
